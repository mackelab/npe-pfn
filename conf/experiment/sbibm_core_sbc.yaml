# @package _global_
name: sbibm_sbc

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      seed: 0, 1, 2, 3, 4
      eval: sbc
      eval.num_sbc_samples: 100
      eval.num_posterior_samples: 100
      method: npe, npe_ensemble
      task: gaussian_linear, two_moons, gaussian_mixture, bernoulli_glm, slcp
      task.num_simulations: 100, 1000, 10_000, 100_000

defaults:
  - _self_
  - override /partition: cpu2
