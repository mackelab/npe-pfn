# @package _global_
name: sbibm

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      seed: 0,1,2,3,4 # Will be 44 jobs * seeds
      eval: c2st
      method: npe_ensemble #, nle, nre
      task: sir, lotka_volterra
      task.num_simulations: 100, 1000, 10_000, 100_000

defaults:
  - _self_
  - override /partition: cpu2

