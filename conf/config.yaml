name: benchmark
seed: 0

model_id: null
save_model: true
save_summary: true

# Output directory for results
hydra:
  run:
    dir: results/${name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: results/${name}/${now:%Y-%m-%d_%H-%M-%S}
    subdir: ${hydra.job.num}  # Cap the directory name to 50 characters

defaults:
  - _self_
  - method: npe
  - task: gaussian_linear
  - eval: c2st
  - launcher: slurm
  - partition: none
  - sweeper: none
